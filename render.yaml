# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard → New → Blueprint → connect repo with this file
databases:
  - name: atomquest-db
    plan: free
    databaseName: atomquest_db
    user: atomquest

services:
  - type: web
    name: atomquest-portal
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: atomquest-db
          property: connectionString
      - key: DATABASE_SSL
        value: 'true'
      - key: JWT_SECRET
        generateValue: true
      - key: CYCLE_DEMO_MODE
        value: 'true'
      - key: CORS_ORIGIN
        sync: false
