# Secrets live in .env (gitignored). Copy .env.example → .env before first run.
services:
  db:
    image: postgres:15-alpine
    container_name: atomquest-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-atomquest_db}
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d atomquest_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atomquest-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-5000}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_HOST: ${DB_HOST:-db}
      DB_NAME: ${DB_NAME:-atomquest_db}
      DB_PORT: ${DB_PORT:-5432}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      NODE_ENV: ${NODE_ENV:-development}
      CYCLE_DEMO_MODE: ${CYCLE_DEMO_MODE:-true}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atomquest-frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
